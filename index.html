<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <title>USB Online</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="SZ7DC4p10o5Tn5wIeU2jm9AGxJyzepoW5W6hKLsNvC0" />
    <link rel="stylesheet" href="/res/css/style.css">
</head>

<body>
    <div class="container">
        <h2>USB Drive (D:)</h2>
        <div class="upload-area" id="uploadArea">
            <p id="uploadText">拖曳檔案到這裡，或點擊選擇檔案</p>
            <input type="file" id="fileInput" multiple hidden>
        </div>
        <select id="expiry">
            <option value="30">保留 30 分鐘</option>
            <option value="60">保留 1 小時</option>
        </select>
        <button class="upload-file">上傳檔案</button>
        <div id="shortUrl"></div>
        <div id="file-list-qrcode">
            <div class="file-list" id="fileList"></div>
            <div id="file-right-side">
                <div id="qrcode"></div>
                <div id="time-left"></div>
            </div>
        </div>
        <button id="deleteAll">刪除全部檔案</button>
    </div>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6142856924229624"
        crossorigin="anonymous"></script>
    <!-- 多媒體廣告 -->
    <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-6142856924229624" data-ad-slot="9716059751"
        data-ad-format="auto" data-full-width-responsive="true"></ins>
    <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
    </script>

    <script src="/res/modules/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
    <script type="module" src="/res/modules/main.js"></script>
</body>

</html>
